server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for fingerprinted build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker must always revalidate so PWA updates propagate
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Web app manifest (correct MIME + revalidate)
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA history fallback: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic gzip for text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
